<body>

    <a href="#continut-principal" class="skip-link">Sari la conținutul principal</a>

    <header>
        <h1>Contactează-mă</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Acasă</a></li>
            <li><a href="about.html">Despre mine</a></li>
            <li><a href="data.html">Experiență și Educație</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main id="continut-principal">
        <section>
            <h2>Trimite un mesaj</h2>
            <p>Dacă ai întrebări sau propuneri de colaborare, folosește formularul de mai jos.</p>

            <form action="#" method="post">
                <fieldset>
                    <legend>Informații de Contact</legend>
                    
                    <div class="form-group">
                        <label for="nume">Nume complet:</label>
                        <input type="text" id="nume" name="nume" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Adresă de e-mail:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Detaliile Mesajului</legend>

                    <div class="form-group">
                        <label for="subiect">Subiect:</label>
                        <select id="subiect" name="subiect">
                            <option value="general">Întrebare generală</option>
                            <option value="proiect">Propunere proiect</option>
                            <option value="feedback">Feedback site</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mesaj">Mesajul tău:</label>
                        <textarea id="mesaj" name="mesaj" rows="5" required></textarea>
                    </div>

                    <button type="submit">Trimite formularul</button>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>

    </footer>

</body>
